# -----------------------------------------------------------------------
# cbindgen configuration for curl-rs-ffi
#
# Controls generation of the C header (include/curl/curl.h) from the Rust
# FFI definitions in curl-rs-ffi/src/.  The generated header is a drop-in
# replacement for the original curl 8.x public headers.
#
# cbindgen version: 0.29.2 (per AAP Section 0.6.1)
#
# Key requirements (from AAP):
#   - Header MUST match curl 8.x public header structure (Section 0.7.3)
#   - Symbol names, parameter types, return types MUST match exactly (Section 0.7.2)
#   - All 100 CURL_EXTERN symbols must appear in the generated header
#   - Enum variant naming preserved exactly (CURLE_OK, CURLM_OK, etc.)
#   - Include guard CURLINC_CURL_H to match curl 8.x
#
# Reference: https://github.com/mozilla/cbindgen/blob/master/docs.md
# SPDX-License-Identifier: curl
# -----------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Target language — pure C output for maximum compatibility with downstream
# consumers.  curl 8.x headers are plain C; the generated header must be
# usable by any C89+ compiler.
# ---------------------------------------------------------------------------
language = "C"

# ---------------------------------------------------------------------------
# Style controls whether items that can be both typedef and tag (enums,
# structs, unions) emit "both" declarations.  curl 8.x uses typedefs
# extensively (e.g. `typedef enum { ... } CURLcode;`), so "both" ensures
# both the tag and the typedef are present for full compatibility.
# ---------------------------------------------------------------------------
style = "both"

# ---------------------------------------------------------------------------
# cpp_compat adds `extern "C"` guards when language is "C", allowing the
# header to be included from C++ translation units without modification.
# The original curl 8.x curl.h wraps its content in:
#   #ifdef __cplusplus
#   extern "C" {
#   #endif
# cbindgen replicates this behavior when cpp_compat = true.
# ---------------------------------------------------------------------------
cpp_compat = true

############################################################################
# Options for Wrapping the Contents of the Header
############################################################################

# Header preamble text — placed at the very top of the generated file,
# before the include guard.  Matches the curl 8.x license banner style.
header = """
/***************************************************************************
 *                                  _   _ ____  _
 *  Project                     ___| | | |  _ \\| |
 *                             / __| | | | |_) | |
 *                            | (__| |_| |  _ <| |___
 *                             \\___|\\___|_| \\_\\_____|
 *
 * Copyright (C) Daniel Stenberg, <daniel@haxx.se>, et al.
 *
 * This software is licensed as described in the file COPYING, which
 * you should have received as part of this distribution. The terms
 * are also available at https://curl.se/docs/copyright.html.
 *
 * You may opt to use, copy, modify, merge, publish, distribute and/or sell
 * copies of the Software, and permit persons to whom the Software is
 * furnished to do so, under the terms of the COPYING file.
 *
 * This software is distributed on an "AS IS" basis, WITHOUT WARRANTY OF ANY
 * KIND, either express or implied.
 *
 * SPDX-License-Identifier: curl
 *
 ***************************************************************************/
"""

# Trailer text — placed at the very end of the generated file, after the
# closing include guard endif.  Empty for curl 8.x compatibility.
trailer = ""

# Include guard matching curl 8.x: the original curl.h uses
#   #ifndef CURLINC_CURL_H
#   #define CURLINC_CURL_H
# cbindgen will emit the same guard.
include_guard = "CURLINC_CURL_H"

# Autogen warning emitted as a comment between the include guard and the
# actual declarations.  Warns maintainers not to hand-edit the header.
autogen_warning = """/* Warning: this file is autogenerated by cbindgen from the curl-rs-ffi Rust crate.
 * It is intended as a drop-in replacement for the original curl C headers.
 * Do not modify this file manually. */"""

# Do not embed the cbindgen version in the header — the curl project does
# not include tool versions in its headers.
include_version = false

# No C++ namespace — this is a pure C header.
# (only applicable when language = "C++", but explicitly set for clarity)
namespace = ""

# Tab width for indentation — match curl 8.x coding style (2-space indent).
tab_width = 2

# Line length hint for documentation wrapping.
line_length = 100

# Documentation style — use C99 `/** ... */` block comments, matching the
# Doxygen-compatible style used in curl 8.x public headers.
documentation_style = "c99"

# Include full documentation text, not abbreviated.
documentation_length = "full"

# Map Rust usize/isize to size_t/ptrdiff_t for C compatibility.
# curl 8.x uses size_t extensively in its public API.
usize_is_size_t = true

# No braces style override — use cbindgen defaults (SameLine for C).
# braces = "SameLine"

# ---------------------------------------------------------------------------
# after_includes — injected immediately after the include guard and autogen
# warning, before any declarations.  Provides the standard C types that
# curl 8.x headers depend on (size_t, time_t, FILE*, stdint types).
# The original curl.h includes <stdio.h>, <limits.h>, <sys/types.h>,
# <time.h>, and platform-specific socket headers.
# ---------------------------------------------------------------------------
after_includes = """
#include <stddef.h>
#include <stdint.h>
#include <stdio.h>
#include <time.h>
#include <sys/types.h>

/* libcurl external API function linkage decorations. */
#ifdef CURL_STATICLIB
#  define CURL_EXTERN
#elif defined(_WIN32)
#  ifdef BUILDING_LIBCURL
#    define CURL_EXTERN __declspec(dllexport)
#  else
#    define CURL_EXTERN __declspec(dllimport)
#  endif
#elif defined(BUILDING_LIBCURL) && defined(CURL_HIDDEN_SYMBOLS)
#  define CURL_EXTERN __attribute__((visibility("default")))
#else
#  define CURL_EXTERN
#endif

/* Socket type compatibility — matches curl 8.x curl_socket_t definition. */
#ifndef curl_socket_typedef
#if defined(_WIN32) && !defined(__LWIP_OPT_H__) && !defined(LWIP_HDR_OPT_H)
typedef SOCKET curl_socket_t;
#define CURL_SOCKET_BAD INVALID_SOCKET
#else
typedef int curl_socket_t;
#define CURL_SOCKET_BAD (-1)
#endif
#define curl_socket_typedef
#endif /* curl_socket_typedef */

/* curl_off_t — 64-bit signed integer for file offsets and transfer sizes.
 * Matches curl 8.x system.h definition. */
#ifndef CURL_TYPEOF_CURL_OFF_T
#if defined(_MSC_VER)
  typedef __int64 curl_off_t;
#  define CURL_FORMAT_CURL_OFF_T "I64d"
#  define CURL_FORMAT_CURL_OFF_TU "I64u"
#  define CURL_SUFFIX_CURL_OFF_T i64
#  define CURL_SUFFIX_CURL_OFF_TU ui64
#else
  typedef long long curl_off_t;
#  define CURL_FORMAT_CURL_OFF_T "lld"
#  define CURL_FORMAT_CURL_OFF_TU "llu"
#  define CURL_SUFFIX_CURL_OFF_T LL
#  define CURL_SUFFIX_CURL_OFF_TU ULL
#endif
#else
  typedef CURL_TYPEOF_CURL_OFF_T curl_off_t;
#endif
"""

############################################################################
# Parse Configuration
############################################################################
[parse]
# Parse dependencies to resolve types used across crate boundaries.
# This allows cbindgen to find types from curl-rs-lib that are re-exported
# through the FFI surface.
parse_deps = true

# Only parse the FFI crate itself — do NOT spider into curl-rs-lib internals
# or other workspace members.  The FFI crate explicitly re-exports everything
# that needs to appear in the C header.
include = ["curl-rs-ffi"]

# Do not restrict to target-only deps; we want all platform configs visible.
extra_bindings = ["curl-rs-ffi"]

############################################################################
# Parse — Expand Configuration
############################################################################
[parse.expand]
# Macro expansion is DISABLED.  The `-Zunpretty=expanded` flag that cbindgen
# uses internally requires the nightly Rust compiler and fails on stable.
# When expansion fails, cbindgen falls back to source parsing which does not
# respect the `language = "C"` setting, producing C++ output instead.
# Since the FFI crate does not use procedural macros that generate #[repr(C)]
# types, expansion is unnecessary and we leave the crates list empty.
crates = []
all_features = false

############################################################################
# Export Configuration
############################################################################
[export]
# No include/exclude filtering — export every #[repr(C)], #[no_mangle],
# and public FFI item discovered in the crate.
include = []
exclude = []

# No prefix — symbol names must match curl 8.x exactly.
# CURLcode, CURLM, CURLSH, curl_easy_init, etc. are emitted verbatim.
prefix = ""

# Export all item types that the FFI crate may produce.
item_types = ["constants", "globals", "enums", "structs", "unions", "typedefs", "opaque", "functions"]

############################################################################
# Export — Rename Configuration
############################################################################
[export.rename]
# No renames — all type names are preserved exactly as defined in Rust.
# CURLcode, CURLMcode, CURLSHcode, CURLoption, CURLINFO, etc. retain
# their original names for curl 8.x ABI compatibility.

############################################################################
# Export — Body Configuration
############################################################################
[export.body]
# No body overrides — all struct/enum bodies are emitted as-is from Rust.

############################################################################
# Enum Configuration
############################################################################
[enum]
# Preserve exact enum variant names.  curl 8.x uses flat C enums with
# globally-scoped names: CURLE_OK, CURLE_UNSUPPORTED_PROTOCOL, CURLM_OK,
# CURLM_BAD_HANDLE, CURLHE_OK, CURLUE_OK, etc.
# "None" means no automatic renaming is applied.
rename_variants = "None"

# Do not add a sentinel value — curl 8.x enums include their own sentinel
# entries (CURL_LAST, CURLM_LAST, etc.) defined explicitly in the Rust code.
add_sentinel = false

# Do not prefix variants with the enum type name — curl 8.x variants
# already carry their own prefix (CURLE_, CURLM_, CURLSH_, etc.).
prefix_with_name = false

# Derive helpers for enums in the C header (all disabled — pure C output).
derive_helper_methods = false
derive_const_casts = false
derive_mut_casts = false

# Do not cast the enum to a specific type — let the compiler pick the
# default representation.  curl 8.x enums are plain `enum` without a
# fixed underlying type annotation.
cast_assert_name = ""

# Do not force an explicit tag enum pattern in C; use plain `typedef enum`.
enum_class = false

############################################################################
# Struct Configuration
############################################################################
[struct]
# Preserve exact field names — curl 8.x struct field names like
# curl_httppost.name, curl_header.value, etc. must match verbatim.
rename_fields = "None"

# No automatic derive annotations in the C output — curl 8.x headers do
# not include operator overloads or comparison functions.
derive_eq = false
derive_neq = false
derive_lt = false
derive_lte = false
derive_gt = false
derive_gte = false

# Do not generate constructors in C output.
derive_constructor = false

############################################################################
# Constant Configuration
############################################################################
[const]
# Allow static const declarations for typed constants.
allow_static_const = true

# Allow constexpr declarations (C++ only, but set for completeness).
allow_constexpr = false

# Emit constants in declaration order.
sort_by = "None"

############################################################################
# Function Configuration
############################################################################
[fn]
# Preserve argument names exactly — curl 8.x function prototypes use
# specific parameter names (e.g., `curl_easy_setopt(CURL *curl,
# CURLoption option, ...)`) that must be reproduced verbatim.
rename_args = "None"

# Automatic argument wrapping — cbindgen decides based on line length
# whether to place arguments on one line or wrap them.
args = "auto"

# Do not sort functions — preserve the declaration order from the Rust
# source files, which is organized to match the curl 8.x header layout.
sort_by = "None"

# Prefix for function declarations — matches the CURL_EXTERN macro that
# curl 8.x uses for all public API functions.
prefix = "CURL_EXTERN"

# Postfix for function declarations (empty — curl 8.x doesn't use one).
postfix = ""

############################################################################
# Macro Expansion Configuration
############################################################################
[macro_expansion]
# Enable bitflags expansion — curl 8.x defines many bitmask constants
# using the bitflags pattern.
bitflags = true

############################################################################
# Defines — cfg-to-preprocessor Mapping
############################################################################
# Maps Rust `#[cfg(feature = "...")]` attributes to C preprocessor macros.
# When cbindgen encounters a declaration gated behind a feature flag, it
# wraps the C output in `#if defined(...)` guards using these mappings.
#
# Naming follows the curl 8.x convention:
#   - Enabled features use CURL_HAS_<PROTOCOL>
#   - This differs from the C codebase's CURL_DISABLE_<PROTOCOL> negative
#     polarity, but the generated header will only emit items when the
#     feature IS enabled, making the positive polarity correct.
[defines]
"feature = http" = "CURL_HAS_HTTP"
"feature = ftp" = "CURL_HAS_FTP"
"feature = smtp" = "CURL_HAS_SMTP"
"feature = imap" = "CURL_HAS_IMAP"
"feature = pop3" = "CURL_HAS_POP3"
"feature = tftp" = "CURL_HAS_TFTP"
"feature = telnet" = "CURL_HAS_TELNET"
"feature = dict" = "CURL_HAS_DICT"
"feature = mqtt" = "CURL_HAS_MQTT"
"feature = rtsp" = "CURL_HAS_RTSP"
"feature = cookies" = "CURL_HAS_COOKIES"
"feature = brotli" = "CURL_HAS_BROTLI"
"feature = zstd" = "CURL_HAS_ZSTD"
"feature = hickory-dns" = "CURL_HAS_HICKORY_DNS"
